<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>eBay リサーチ</title>
  <style>
    body { font-family: sans-serif; max-width: 960px; margin: 40px auto; padding: 0 20px; background: #f9f9f9; }
    h1 { font-size: 22px; margin-bottom: 4px; }
    p.sub { color: #888; font-size: 13px; margin-bottom: 20px; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; align-items: center; }
    select, button, input { font-size: 14px; padding: 8px 12px; border: 1px solid #ccc; border-radius: 6px; background: white; }
    button { background: #0064d2; color: white; border: none; cursor: pointer; }
    button:hover { background: #004ea0; }
    button.back { background: #888; }
    button.back:hover { background: #666; }
    #status { font-size: 13px; color: #888; margin-bottom: 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; }
    .card { background: white; border-radius: 10px; border: 1px solid #e0e0e0; overflow: hidden; transition: box-shadow 0.2s; }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
    .card img { width: 100%; height: 180px; object-fit: cover; background: #eee; }
    .card-body { padding: 12px; }
    .card-title { font-size: 13px; color: #333; margin-bottom: 8px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .card-price { font-size: 18px; font-weight: bold; color: #0064d2; margin-bottom: 4px; }
    .card-price-jpy { font-size: 12px; color: #888; margin-bottom: 8px; }
    .card-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; }
    .tag-jp { background: #e0f0ff; color: #0064d2; }
    .tag-us { background: #e6f4ea; color: #2d7a3a; }
    .tag-cond { background: #f5f5f5; color: #555; }
    .card-seller { font-size: 11px; color: #999; margin-bottom: 8px; }
    .card-link { display: inline-block; font-size: 12px; color: #0064d2; text-decoration: none; margin-right: 10px; }
    .card-link:hover { text-decoration: underline; }
    .count-btn { font-size: 11px; padding: 4px 10px; border-radius: 6px; background: #f0f0f0; color: #333; border: 1px solid #ccc; cursor: pointer; margin-top: 6px; width: 100%; }
    .count-btn:hover { background: #e0e0e0; }
    .count-result { margin-top: 6px; font-size: 13px; font-weight: bold; color: #0064d2; text-align: center; }
    .empty { padding: 3rem; text-align: center; color: #aaa; grid-column: 1/-1; }
    .section-title { font-size: 15px; font-weight: bold; margin-bottom: 12px; color: #333; }
  </style>
</head>
<body>
  <h1>eBay 週間リサーチ 🇯🇵→🇺🇸</h1>
  <p class="sub">日本発送・アメリカ向けの出品をリサーチ</p>

  <div class="controls" id="main-controls">
    <select id="category">
      <option value="293">Electronics</option>
      <option value="11450">Fashion</option>
      <option value="353">Collectibles & Art</option>
      <option value="11700">Home & Garden</option>
      <option value="888">Sporting Goods</option>
      <option value="220">Toys & Hobbies</option>
      <option value="6028">Motors (Parts)</option>
      <option value="26395">Health & Beauty</option>
    </select>
    <button onclick="search()">検索</button>
  </div>

  <div id="status"></div>
  <div class="grid" id="grid">
    <div class="empty">カテゴリーを選んで検索してください</div>
  </div>

  <script>
    const JPY = 150;

    async function search() {
      const category = document.getElementById('category').value;
      document.getElementById('status').textContent = '取得中...';
      document.getElementById('grid').innerHTML = '';

      const res = await fetch(`/api/ebay?categoryId=${category}`);
      const data = await res.json();
      renderItems(data, 'カテゴリー検索結果');
    }

    async function searchCount(keyword, btnEl) {
      btnEl.textContent = '調べ中...';
      btnEl.disabled = true;

      const res = await fetch(`/api/ebay?keyword=${encodeURIComponent(keyword)}`);
      const data = await res.json();
      const total = data.total || 0;

      const resultEl = btnEl.nextElementSibling;
      resultEl.textContent = `🇯🇵→🇺🇸 出品数：${total.toLocaleString()} 件`;
      btnEl.textContent = '再検索';
      btnEl.disabled = false;
    }

    function extractKeyword(title) {
      // タイトルから最初の5単語をキーワードとして使う
      return title.split(' ').slice(0, 5).join(' ');
    }

    function renderItems(data, title) {
      const items = data.itemSummaries || [];

      if (items.length === 0) {
        document.getElementById('status').textContent = '商品が見つかりませんでした。';
        document.getElementById('grid').innerHTML = '<div class="empty">該当商品なし</div>';
        return;
      }

      document.getElementById('status').textContent = `${data.total?.toLocaleString() || items.length}件中 ${items.length}件を表示`;

      document.getElementById('grid').innerHTML = items.map((item, i) => {
        const price = parseFloat(item.price?.value || 0);
        const jpy = Math.round(price * JPY).toLocaleString();
        const img = item.image?.imageUrl || '';
        const condition = item.condition || '';
        const seller = item.seller?.username || '';
        const url = item.itemWebUrl || '#';
        const shipping = item.shippingOptions?.[0]?.shippingCost?.value;
        const shippingText = shipping === '0.00' ? '送料無料' : shipping ? `送料 $${shipping}` : '';
        const keyword = extractKeyword(item.title);

        return `
          <div class="card">
            ${img ? `<img src="${img}" alt="" loading="lazy">` : ''}
            <div class="card-body">
              <div class="card-title">${item.title}</div>
              <div class="card-price">$${price.toFixed(2)}</div>
              <div class="card-price-jpy">≈ ¥${jpy}　${shippingText}</div>
              <div class="card-meta">
                <span class="tag tag-jp">🇯🇵 日本発送</span>
                <span class="tag tag-us">🇺🇸 US向け</span>
                ${condition ? `<span class="tag tag-cond">${condition}</span>` : ''}
              </div>
              <div class="card-seller">出品者: ${seller}</div>
              <a class="card-link" href="${url}" target="_blank">eBayで見る →</a>
              <button class="count-btn" onclick="searchCount('${keyword.replace(/'/g, '')}', this)">この商品の出品数を調べる</button>
              <div class="count-result"></div>
            </div>
          </div>`;
      }).join('');
    }
  </script>
</body>
</html>
